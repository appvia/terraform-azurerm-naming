---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - dependencies
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: terraform
    directories:
      - /
      - /examples/*
      - /modules/*
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - dependencies
    groups:
      terraform:
        patterns:
          - "*"
